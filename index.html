function parseSchools(arr){return arr.map(a=>({state:a[0],city:a[1],school:a[2],registered:a[3],active:a[4],matched:a[5],unmatched:a[6]}))}
function aggregateStates(schools){const a={};schools.forEach(s=>{if(!a[s.state])a[s.state]={registered:0,active:0,matched:0,unmatched:0,schools:[]};a[s.state].registered+=s.registered;a[s.state].active+=s.active;a[s.state].matched+=s.matched;a[s.state].unmatched+=s.unmatched;a[s.state].schools.push(s)});return a}
const schoolTrends={};YEARS.forEach(y=>{parseSchools(S[y]).forEach(s=>{if(!schoolTrends[s.school])schoolTrends[s.school]={};schoolTrends[s.school][y]=s})});
const yearTotals={};YEARS.forEach(y=>{const sc=parseSchools(S[y]);yearTotals[y]=sc.reduce((a,s)=>({registered:a.registered+s.registered,active:a.active+s.active,matched:a.matched+s.matched,unmatched:a.unmatched+s.unmatched}),{registered:0,active:0,matched:0,unmatched:0})});

function sparkSVG(vals,w,h,color,hl){if(!vals||vals.length<2)return'';const mx=Math.max(...vals),mn=Math.min(...vals),r=mx-mn||1;const pts=vals.map((v,i)=>{const x=(i/(vals.length-1))*(w-4)+2,y=h-2-((v-mn)/r)*(h-4);return`${x},${y}`});const l=pts[pts.length-1].split(',');let s=`<svg class="mini-chart" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${color}" stroke-width="1.5" points="${pts.join(' ')}"/>`;if(hl)s+=`<circle cx="${l[0]}" cy="${l[1]}" r="2.5" fill="${color}"/>`;return s+'</svg>'}
function chgBadge(cur,prev,invert){if(prev==null||prev===0)return'';const p=((cur-prev)/prev*100).toFixed(1),c=invert?(p>0?'down':p<0?'up':'flat'):(p>0?'up':p<0?'down':'flat'),a=p>0?'▲':p<0?'▼':'–';return`<div class="stat-change ${c}">${a} ${Math.abs(p)}% vs ${currentYear-1}</div>`}
function yoyLine(label,cur,prev,invert){const d=cur-prev,p=prev?((d/prev)*100).toFixed(1):'—',c=invert?(d>0?'down':d<0?'up':'flat'):(d>0?'up':d<0?'down':'flat'),a=d>0?'▲':d<0?'▼':'–';return`<span class="${c}">${label}: ${a} ${Math.abs(d)} (${d>0?'+':''}${p}%)</span><br>`}

        {name:"PGY1 Positions",id:A.positions,layer:2},{name:"Filled",id:A.filled,layer:3},{name:"Unfilled",id:A.unfilled,layer:3},
        {name:`PGY1 General (${tf.general.toLocaleString()})`,id:A.gen_f,layer:4},{name:`PGY1 Community (${tf.community})`,id:A.com_f,layer:4},
        {name:`PGY1 Managed Care (${tf.managed})`,id:A.man_f,layer:4},{name:`PGY1&2 Admin (${tf.admin})`,id:A.adm_f,layer:4},{name:`Other Programs (${tf.other})`,id:A.oth_f,layer:4},
        {name:`General Unfilled (${tu.general})`,id:A.gen_u,layer:4},{name:`Community Unfilled (${tu.community})`,id:A.com_u,layer:4},
        {name:`Admin Unfilled (${tu.admin})`,id:A.adm_u,layer:4},{name:`Other Unfilled (${tu.other})`,id:A.oth_u,layer:4}
    );
    Object.keys(stateNodes).forEach(st=>{const d=stateAgg[st],w=d.registered-d.active;if(w>0)links.push({source:stateNodes[st],target:A.withdrew,value:w,color:'#f39c12'});if(d.matched>0)links.push({source:stateNodes[st],target:A.matched,value:d.matched,color:'#2ecc71'});if(d.unmatched>0)links.push({source:stateNodes[st],target:A.unmatched,value:d.unmatched,color:'#e74c3c'})});
    links.push({source:A.matched,target:A.positions,value:p.filled},{source:A.positions,target:A.filled,value:p.filled},{source:A.positions,target:A.unfilled,value:p.unfilled},
        {source:A.filled,target:A.gen_f,value:tf.general},{source:A.filled,target:A.com_f,value:tf.community},{source:A.filled,target:A.man_f,value:tf.managed},{source:A.filled,target:A.adm_f,value:tf.admin},{source:A.filled,target:A.oth_f,value:tf.other},
        {source:A.unfilled,target:A.gen_u,value:tu.general},{source:A.unfilled,target:A.com_u,value:tu.community},{source:A.unfilled,target:A.adm_u,value:tu.admin},{source:A.unfilled,target:A.oth_u,value:tu.other});

    const getColor=n=>{if(n.layer===0)return'#34495e';if(n.name==='Withdrew')return'#f39c12';if(n.name.includes('Matched'))return'#2ecc71';if(n.name==='Active & Unmatched')return'#e74c3c';if(n.name==='PGY1 Positions')return'#95a5a6';if(n.name==='Filled')return'#2ecc71';if(n.name==='Unfilled')return'#e74c3c';if(n.name.includes('Unfilled'))return'#e74c3c';if(n.layer===4)return'#9b59b6';return'#95a5a6'};

    svgRoot=d3.select('#chart').append('svg').attr('width',svgTotalWidth).attr('height',height+margin.top+margin.bottom);
    const svg=svgRoot.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
    const tooltip=d3.select('#tooltip');

    const sankeyGen=d3.sankey().nodeId(d=>d.id).nodeWidth(20).nodePadding(15).extent([[0,0],[pgy1Width,height]]).nodeSort((a,b)=>a.layer!==b.layer?a.layer-b.layer:a.id-b.id);
    const graph=sankeyGen({nodes:nodes.map(d=>Object.assign({},d)),links:links.map(d=>Object.assign({},d))});
    const cw=pgy1Width/5;
    graph.nodes.forEach(n=>{const col=[0,1.5,2.5,3.5,4.5][n.layer]||0;n.x0=col*cw;n.x1=col*cw+20});
    sankeyGen.update(graph);

    svg.append('g').selectAll('path').data(graph.links).join('path').attr('class','link').attr('d',d3.sankeyLinkHorizontal()).attr('stroke-width',d=>Math.max(1,d.width)).style('stroke',d=>d.color||getColor(d.source))
        .on('mouseover',function(e,d){tooltip.style('display','block').html(`<strong>${d.source.name} → ${d.target.name}</strong><br>Count: ${d.value.toLocaleString()}`)}).on('mousemove',function(e){tooltip.style('left',(e.pageX+10)+'px').style('top',(e.pageY-10)+'px')}).on('mouseout',()=>tooltip.style('display','none'));

    const node=svg.append('g').selectAll('g').data(graph.nodes).join('g').attr('class','node').call(d3.drag().on('start',function(){d3.select(this).raise()}).on('drag',function(e,d){const nw=d.x1-d.x0,nh=d.y1-d.y0;d.x0=Math.max(0,Math.min(pgy1Width-nw,e.x));d.x1=d.x0+nw;d.y0=Math.max(0,Math.min(height-nh,e.y));d.y1=d.y0+nh;d3.select(this).select('rect').attr('x',d.x0).attr('y',d.y0);d3.select(this).selectAll('text').attr('x',d=>d.x0<pgy1Width/2?d.x1+6:d.x0-6).attr('y',d=>(d.y1+d.y0)/2);sankeyGen.update(graph);svg.selectAll('.link').attr('d',d3.sankeyLinkHorizontal())}));
    node.append('rect').attr('x',d=>d.x0).attr('y',d=>d.y0).attr('height',d=>d.y1-d.y0).attr('width',d=>d.x1-d.x0).attr('fill',d=>getColor(d))
        .on('click',function(e,d){if(d.layer===0)showStateDetail(d.name,stateAgg)})
        .on('mouseover',function(e,d){let h=`<strong>${d.name}</strong><br>`;if(d.layer===0&&stateAgg[d.name]){const sd=stateAgg[d.name],w=sd.registered-sd.active;h+=`Registered: ${sd.registered}<br>Active: ${sd.active}<br><span style="color:#f39c12">Withdrew: ${w}</span><br><span style="color:#2ecc71">Matched: ${sd.matched}</span><br><span style="color:#e74c3c">Unmatched: ${sd.unmatched}</span><br>`;const py=currentYear-1;if(YEARS.includes(py)){const pa=aggregateStates(parseSchools(S[py]));if(pa[d.name]){const ps=pa[d.name];h+=`<div class="yoy"><strong>${py} comparison:</strong><br>${yoyLine('Registered',sd.registered,ps.registered)}${yoyLine('Matched',sd.matched,ps.matched)}${yoyLine('Unmatched',sd.unmatched,ps.unmatched,true)}</div>`}}h+=`<em>Click to see schools</em>`}else{h+=`Count: ${d.value.toLocaleString()}`}tooltip.style('display','block').html(h)})
        .on('mousemove',function(e){tooltip.style('left',(e.pageX+10)+'px').style('top',(e.pageY-10)+'px')}).on('mouseout',()=>tooltip.style('display','none'));
    node.append('text').attr('x',d=>d.x0<pgy1Width/2?d.x1+6:d.x0-6).attr('y',d=>(d.y1+d.y0)/2).attr('dy','0.35em').attr('text-anchor',d=>d.x0<pgy1Width/2?'start':'end').text(d=>d.name).style('font-size','11px').style('font-weight','500');
    node.append('text').attr('x',d=>d.x0<pgy1Width/2?d.x1+6:d.x0-6).attr('y',d=>(d.y1+d.y0)/2).attr('dy','1.5em').attr('text-anchor',d=>d.x0<pgy1Width/2?'start':'end').text(d=>d.value.toLocaleString()).style('font-size','10px').style('fill','#666');

    // ── PGY2 SECTION (proper second Sankey) ────────────────────
    drawPGY2(svg, tooltip);
}

function drawPGY2(svg, tooltip) {
    const g2 = pgy2Summary[currentYear];

    // Layout: Positions → Category totals → Filled/Unfilled per category
    const typeKeys = ['ambcare','critcare','onc','id','em','peds','psych','cardio','intmed','transplant','admin','other'];
    const activeTypes = typeKeys.filter(k => (g2.types_filled[k]||0) + (g2.types_unfilled[k]||0) > 0);

    let pNodes = [], pLinks = [], pid = 0;
    const P = {};

    // Layer 0: PGY2 Positions
    P.positions = pid;
    pNodes.push({name:'PGY2 Positions', id:pid++, pgy2layer:0, pgy2key:'positions', pgy2side:'all'});

    // Layer 1: Category totals
    activeTypes.forEach(k => {
        const total = (g2.types_filled[k]||0) + (g2.types_unfilled[k]||0);
        const fillPct = total > 0 ? Math.round((g2.types_filled[k]||0) / total * 100) : 0;
        P['cat_'+k] = pid;
        pNodes.push({name: pgy2TypeLabels[k], id:pid++, pgy2layer:1, pgy2key:k, pgy2side:'category', catTotal:total, catFillPct:fillPct});
    });

    // Layer 2: Filled + Unfilled per category
    activeTypes.forEach(k => {
        const fv = g2.types_filled[k]||0, uv = g2.types_unfilled[k]||0;
        if (fv > 0) { P['filled_'+k] = pid; pNodes.push({name:'Filled ('+fv+')', id:pid++, pgy2layer:2, pgy2key:k, pgy2side:'filled'}); }
        if (uv > 0) { P['unfilled_'+k] = pid; pNodes.push({name:'Unfilled ('+uv+')', id:pid++, pgy2layer:2, pgy2key:k, pgy2side:'unfilled'}); }
    });

    // Links: Positions → category totals
    activeTypes.forEach(k => {
        const total = (g2.types_filled[k]||0) + (g2.types_unfilled[k]||0);
        pLinks.push({source:P.positions, target:P['cat_'+k], value:total, ltype:'category'});
    });

    // Links: category → filled/unfilled
    activeTypes.forEach(k => {
        const fv = g2.types_filled[k]||0, uv = g2.types_unfilled[k]||0;
        if (fv > 0) pLinks.push({source:P['cat_'+k], target:P['filled_'+k], value:fv, ltype:'filled'});
        if (uv > 0) pLinks.push({source:P['cat_'+k], target:P['unfilled_'+k], value:uv, ltype:'unfilled'});
    });

    // Colors
    const pgy2Color = n => {
        if (n.pgy2key === 'positions') return '#95a5a6';
        if (n.pgy2side === 'category') return pgy2TypeColors[n.pgy2key] || '#1abc9c';
        if (n.pgy2side === 'filled') return '#2ecc71';
        if (n.pgy2side === 'unfilled') return '#e74c3c';
        return '#95a5a6';
    };
    const linkColor = d => {
        if (d.ltype === 'filled') return '#2ecc71';
        if (d.ltype === 'unfilled') return '#e74c3c';
        return pgy2TypeColors[d.target.pgy2key] || '#1abc9c';
    };

    // Layout dimensions
    const pgy2Left = 1380, pgy2Width = 700, pgy2Height = 1400, pgy2Top = 60;

    // Header
    svg.append('line').attr('x1',pgy2Left-20).attr('y1',20).attr('x2',pgy2Left-20).attr('y2',pgy2Top+pgy2Height+20)
        .attr('stroke','#bdc3c7').attr('stroke-width',1).attr('stroke-dasharray','6,4');
    svg.append('text').attr('x',pgy2Left).attr('y',pgy2Top-25).text('PGY2 MATCH — Fill Rate by Specialty')
        .style('font-size','14px').style('font-weight','700').style('fill','#2c3e50');
    const frVals = YEARS.map(y=>pgy2Summary[y].filled/pgy2Summary[y].positions*100);
    const sparkEl = svg.append('foreignObject').attr('x',pgy2Left).attr('y',pgy2Top-18).attr('width',420).attr('height',22);
    sparkEl.append('xhtml:div').html(
        `<span style="font-size:11px;color:#7f8c8d">${g2.positions} total positions · Overall fill rate: ${(g2.filled/g2.positions*100).toFixed(1)}%</span> `+
        `${sparkSVG(frVals,60,16,'#1abc9c',true)} <span style="font-size:9px;color:#aaa">'22–'26</span>`
    );

    // Sankey
    const pgy2Sankey = d3.sankey()
        .nodeId(d => d.id).nodeWidth(20).nodePadding(6)
        .extent([[pgy2Left, pgy2Top],[pgy2Left + pgy2Width, pgy2Top + pgy2Height]])
        .nodeSort((a,b) => {
            if (a.pgy2layer !== b.pgy2layer) return a.pgy2layer - b.pgy2layer;
            if (a.pgy2layer === 2 && a.pgy2key === b.pgy2key) return a.pgy2side === 'filled' ? -1 : 1;
            return a.id - b.id;
        });

    const pgy2Graph = pgy2Sankey({
        nodes: pNodes.map(d => Object.assign({}, d)),
        links: pLinks.map(d => Object.assign({}, d))
    });

    // Force column x-positions
    const colX = [pgy2Left, pgy2Left + pgy2Width * 0.35, pgy2Left + pgy2Width * 0.78];
    pgy2Graph.nodes.forEach(n => { const cx = colX[n.pgy2layer], w = n.x1 - n.x0; n.x0 = cx; n.x1 = cx + w; });
    pgy2Sankey.update(pgy2Graph);

    // Links
    const pgy2LinkGroup = svg.append('g');
    const pgy2Links = pgy2LinkGroup.selectAll('.pgy2-link').data(pgy2Graph.links).join('path')
        .attr('class','pgy2-link').attr('d', d3.sankeyLinkHorizontal())
        .attr('stroke-width', d => Math.max(1, d.width))
        .style('stroke', d => linkColor(d)).style('stroke-opacity', 0.25).style('fill','none')
        .on('mouseover', function(e,d) { d3.select(this).style('stroke-opacity',0.5); tooltip.style('display','block').html(`<strong>${d.source.name} → ${d.target.name}</strong><br>Count: ${d.value.toLocaleString()}`); })
        .on('mousemove', function(e) { tooltip.style('left',(e.pageX+10)+'px').style('top',(e.pageY-10)+'px'); })
        .on('mouseout', function() { d3.select(this).style('stroke-opacity',0.25); tooltip.style('display','none'); });

    // Nodes with drag
    const pgy2Node = svg.append('g').selectAll('.pgy2-node').data(pgy2Graph.nodes).join('g').attr('class','pgy2-node')
        .call(d3.drag()
            .on('start', function() { d3.select(this).raise(); })
            .on('drag', function(e, d) {
                const nw = d.x1-d.x0, nh = d.y1-d.y0;
                d.x0 = Math.max(0,e.x); d.x1 = d.x0+nw; d.y0 = Math.max(0,e.y); d.y1 = d.y0+nh;
                d3.select(this).select('rect').attr('x',d.x0).attr('y',d.y0);
                d3.select(this).selectAll('text').attr('x',d.x1+6).attr('y',(d.y1+d.y0)/2);
                pgy2Sankey.update(pgy2Graph);
                pgy2Links.attr('d', d3.sankeyLinkHorizontal());
            }));

    pgy2Node.append('rect')
        .attr('x', d=>d.x0).attr('y', d=>d.y0).attr('height', d=>d.y1-d.y0).attr('width', d=>d.x1-d.x0)
        .attr('fill', d=>pgy2Color(d)).attr('fill-opacity', d=>d.pgy2side==='unfilled'?0.8:0.9)
        .attr('stroke','#000').attr('stroke-width',0.5)
        .on('mouseover', function(e,d) {
            const key = d.pgy2key;
            let yearVals, col = '#1abc9c', extra = '';
            if (key === 'positions') { yearVals = YEARS.map(y=>pgy2Summary[y].positions); }
            else if (d.pgy2side === 'category') {
                yearVals = YEARS.map(y=>(pgy2Summary[y].types_filled[key]||0)+(pgy2Summary[y].types_unfilled[key]||0));
                col = pgy2TypeColors[key];
                const fv=g2.types_filled[key]||0, uv=g2.types_unfilled[key]||0, tot=fv+uv;
                extra = `<br><strong>Fill rate: ${tot>0?(fv/tot*100).toFixed(1):0}%</strong> (${fv} filled, ${uv} unfilled)`;
                extra += '<br><span style="font-size:11px;color:#aaa">Fill rate by year:</span><br>';
                YEARS.forEach(y => {
                    const yf=pgy2Summary[y].types_filled[key]||0, yu=pgy2Summary[y].types_unfilled[key]||0, yt=yf+yu;
                    const bold = y===currentYear ? 'font-weight:bold;' : '';
                    extra += `<span style="${bold}">${y}: ${yt>0?(yf/yt*100).toFixed(0):'—'}%</span> `;
                });
            } else if (d.pgy2side === 'filled') { yearVals = YEARS.map(y=>pgy2Summary[y].types_filled[key]||0); col = '#2ecc71'; }
            else { yearVals = YEARS.map(y=>pgy2Summary[y].types_unfilled[key]||0); col = '#e74c3c'; }
            const isUnfilled = d.pgy2side === 'unfilled';
            tooltip.style('display','block').html(pgy2Tooltip(d.name, d.value, yearVals, col, isUnfilled) + extra);
        })
        .on('mousemove', function(e) { tooltip.style('left',(e.pageX+10)+'px').style('top',(e.pageY-10)+'px'); })
        .on('mouseout', ()=>tooltip.style('display','none'));

    // Labels — show fill % on category nodes
    pgy2Node.append('text')
        .attr('x', d=>d.x1+6).attr('y', d=>(d.y1+d.y0)/2).attr('dy','0.35em').attr('text-anchor','start')
        .text(d => {
            if (d.pgy2side === 'category') {
                const fv=g2.types_filled[d.pgy2key]||0, tot=d.catTotal;
                return d.name+' ('+tot+') — '+(tot>0?Math.round(fv/tot*100):0)+'% filled';
            }
            return d.name;
        })
        .style('font-size','11px').style('font-weight', d=>d.pgy2side==='category'?'600':'500')
        .style('fill', d=>d.pgy2side==='unfilled'?'#c0392b':'#333');

    pgy2Node.append('text')
        .attr('x', d=>d.x1+6).attr('y', d=>(d.y1+d.y0)/2).attr('dy','1.5em').attr('text-anchor','start')
        .text(d=>d.value.toLocaleString()).style('font-size','10px').style('fill','#666');
}

function pgy2Tooltip(label, value, yearVals, col, invert) {
    col = col || '#1abc9c';
    let h = `<strong>${label}</strong><br>Current: ${value.toLocaleString()}<br>`;
    h += `<div class="yoy"><strong>5-Year Trend:</strong><br>`;
    YEARS.forEach((y,i) => {
        const v = yearVals[i];
        const bold = y === currentYear ? 'font-weight:bold;' : '';
        h += `<span style="${bold}">${y}: ${v.toLocaleString()}</span>`;
        if (i > 0) {
            const prev = yearVals[i-1];
            const diff = v - prev;
            const cls = invert ? (diff > 0 ? 'down' : diff < 0 ? 'up' : 'flat') : (diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat');
            const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '–';
            h += ` <span class="${cls}">${arrow}${Math.abs(diff)}</span>`;
        }
        h += '<br>';
    });
    h += `</div>${sparkSVG(yearVals, 120, 28, col, true)}`;
    return h;
}

// ── STATE DETAIL PANEL ──────────────────────────────────────────
function showStateDetail(stateName,stateAgg){
    if(!stateAgg[stateName])return;
    const panel=document.getElementById('stateDetail'),content=document.getElementById('stateDetailContent');
    const sd=stateAgg[stateName],w=sd.registered-sd.active;
    let html=`<h3>${stateName} — ${currentYear} Schools</h3><div style="margin-bottom:15px;padding:10px;background:#e8f4f8;border-radius:4px;"><strong>State Totals:</strong><br>Registered: ${sd.registered} | Active: ${sd.active} | <span style="color:#f39c12;font-weight:bold;">Withdrew: ${w}</span> | <span style="color:#2ecc71;font-weight:bold;">Matched: ${sd.matched}</span> | <span style="color:#e74c3c;font-weight:bold;">Unmatched: ${sd.unmatched}</span></div>`;
    sd.schools.forEach(school=>{
        const sw=school.registered-school.active,trend=schoolTrends[school.school];
        const mV=YEARS.map(y=>trend&&trend[y]?trend[y].matched:null).filter(v=>v!==null);
        const rV=YEARS.map(y=>trend&&trend[y]?trend[y].registered:null).filter(v=>v!==null);
        const uV=YEARS.map(y=>trend&&trend[y]?trend[y].unmatched:null).filter(v=>v!==null);
        html+=`<div class="school-item"><div class="school-name">${school.school}</div><div class="school-stats"><div class="stat-row"><span>Registered:</span><strong>${school.registered}</strong></div><div class="stat-row"><span>Active:</span><strong>${school.active}</strong></div><div class="stat-row"><span>Withdrew:</span><strong style="color:#f39c12">${sw}</strong></div><div class="stat-row"><span>Matched:</span><strong style="color:#2ecc71">${school.matched}</strong></div><div class="stat-row"><span>Unmatched:</span><strong style="color:#e74c3c">${school.unmatched}</strong></div><div class="stat-row"><span>Match Rate:</span><strong>${school.active>0?(school.matched/school.active*100).toFixed(0)+'%':'N/A'}</strong></div></div><div class="school-trend-row"><span class="school-trend-label">Registered</span>${sparkSVG(rV,70,18,'#3498db',true)}<span class="school-trend-label" style="margin-left:8px">Matched</span>${sparkSVG(mV,70,18,'#2ecc71',true)}<span class="school-trend-label" style="margin-left:8px">Unmatched</span>${sparkSVG(uV,70,18,'#e74c3c',true)}</div><div style="font-size:10px;color:#aaa;margin-top:2px">5-year trend (2022–2026)</div></div>`;
    });
    content.innerHTML=html;panel.style.display='block';
}

function switchYear(y){currentYear=y;renderYearButtons();renderSummaryStats();renderNote();buildSankey()}
renderYearButtons();renderSummaryStats();renderNote();buildSankey();
</script>
